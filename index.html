<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Montessori Elite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }
    header {
      background: black;
      color: white;
      padding: 20px;
      font-size: 24px;
    }
    .container {
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
    button {
      background: black;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  Montessori Elite
</header>

<div class="container">

  <h1>1 activité Montessori par jour</h1>
  <p>Simple, rapide, sans préparation compliquée</p>

  <div class="card">
    <h2>Transvasement à la cuillère</h2>
    <p><b>Âge :</b> 2-3 ans</p>
    <p><b>Durée :</b> 10 min</p>
    <p><b>Matériel :</b> 2 bols + riz</p>
    <p><b>Objectif :</b> motricité fine</p>
  </div>

  <br>

  <button>S’abonner</button>

</div>

</body>
</html>
